<ng-template #avatarTmpl>
  <img appAdminImage [image]="(user$ | async)?.email" [type]="'user'" class="avatar" alt="avatar" />
</ng-template>

<!-- if user is logged-in: display user's avatar and user menu -->
@if (isLoggedIn$ | async) {
<button matButton [matMenuTriggerFor]="userMenu" class="user-menu" data-cy="user-button">
  <ng-container *ngTemplateOutlet="avatarTmpl" />
</button>

} @else {
<button matButton="filled" [matMenuTriggerFor]="loginForm" data-cy="login-button">
  {{ 'pages.userSettings.userMenu.login' | translate }}
</button>
}
<mat-menu #loginForm xPosition="before">
  <app-login-form (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()" />
</mat-menu>

<mat-menu #userMenu="matMenu" xPosition="before" class="user-menu">
  <div class="menu-header" (click)="$event.stopPropagation()">
    <ng-container *ngTemplateOutlet="avatarTmpl" />

    @if (user$ | async; as user) {
    <div class="mat-body-large" style="margin-top: 8px">{{ user.givenName }} {{ user.familyName }}</div>
    <div class="mat-body-small">{{ user.email }}</div>
    }
  </div>

  <a mat-menu-item [routerLink]="['/', MY_PROFILE, 'account']">
    {{ 'pages.userSettings.userMenu.myAccount' | translate }}
  </a>

  @if (isSysAdmin$ | async) {
  <a mat-menu-item [routerLink]="['/', systemLink]">
    {{ 'pages.userSettings.userMenu.systemAdministration' | translate }}
  </a>
  }

  <mat-divider />

  <button mat-menu-item (click)="logout()">{{ 'pages.userSettings.userMenu.logout' | translate }}</button>
</mat-menu>
