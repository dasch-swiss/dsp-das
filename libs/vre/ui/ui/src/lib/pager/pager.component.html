<div class="mat-label-medium" style="display: flex; justify-content: space-between; align-items: center">
  <div>{{ 'ui.pager.showing' | translate }} {{ itemRange }}</div>

  <div style="display: flex; align-items: center">
    <button
      matIconButton
      [matTooltip]="'ui.pager.firstPage' | translate"
      (click)="pageIndex = 0"
      [disabled]="pageIndex === 0">
      <mat-icon>first_page</mat-icon>
    </button>

    <button
      matIconButton
      [matTooltip]="'ui.pager.previousPage' | translate"
      (click)="pageIndex = pageIndex - 1"
      [disabled]="pageIndex === 0">
      <mat-icon>chevron_left</mat-icon>
    </button>

    <mat-form-field class="page-input" subscriptSizing="dynamic">
      <input
        #pageInput
        type="number"
        matInput
        [value]="pageIndex + 1"
        (focus)="selectText($event)"
        (blur)="resetToCurrentPage()"
        (keyup.enter)="goToPage()"
        [matTooltip]="'ui.pager.inputTooltip' | translate" />
    </mat-form-field>

    <span>{{ 'ui.pager.rangeLabelOf' | translate }} {{ lastPageIndex + 1 }}</span>

    <button
      matIconButton
      [matTooltip]="'ui.common.actions.next' | translate"
      (click)="pageIndex = pageIndex + 1"
      [disabled]="pageIndex === lastPageIndex">
      <mat-icon>chevron_right</mat-icon>
    </button>

    <button
      matIconButton
      [matTooltip]="'ui.pager.lastPage' | translate"
      (click)="pageIndex = lastPageIndex"
      [disabled]="pageIndex === lastPageIndex">
      <mat-icon>last_page</mat-icon>
    </button>
  </div>
</div>
